<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0f0c29 0%, #1a1a3e 40%, #24243e 100%);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(72, 50, 120, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(100, 60, 180, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(50, 80, 150, 0.08) 0%, transparent 50%);
            animation: bgDrift 20s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes bgDrift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 1%) rotate(1deg); }
            66% { transform: translate(-1%, -1%) rotate(-1deg); }
        }

        /* 粒子星星 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.2); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
        }

        /* 页头 */
        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .header-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #ffecd2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            text-shadow: none;
            position: relative;
            display: inline-block;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #f5576c, transparent);
            border-radius: 2px;
        }

        .header p {
            color: rgba(255,255,255,0.5);
            margin-top: 20px;
            font-size: 15px;
            letter-spacing: 2px;
        }

        /* 游戏卡片网格 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
            width: 100%;
        }

        /* 游戏卡片 */
        .game-card {
            position: relative;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6), 0 0 30px rgba(245,87,108,0.1);
        }

        .game-card:active {
            transform: translateY(-2px) scale(0.98);
        }

        /* 卡片顶部图片区 */
        .card-banner {
            position: relative;
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a3e, #2d1b69);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-banner .banner-emoji {
            font-size: 64px;
            z-index: 2;
            animation: floatIcon 4s ease-in-out infinite;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .card-banner .banner-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(245,87,108,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(240,147,251,0.1) 0%, transparent 50%);
            animation: bannerShift 8s ease-in-out infinite;
        }

        @keyframes bannerShift {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.05); }
        }

        /* 卡片装饰边框光效 */
        .card-banner::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(245,87,108,0.6), rgba(240,147,251,0.6), transparent);
        }

        /* 卡片内容 */
        .card-body {
            padding: 22px 24px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title .tag {
            font-size: 11px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .card-desc {
            color: rgba(255,255,255,0.55);
            font-size: 14px;
            line-height: 1.6;
            flex: 1;
            margin-bottom: 18px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .card-meta .info {
            color: rgba(255,255,255,0.35);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-meta .info span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .play-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            color: #fff;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(245,87,108,0.3);
            position: relative;
            overflow: hidden;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .play-btn:hover::before {
            left: 100%;
        }

        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245,87,108,0.45);
        }

        .play-btn:active {
            transform: translateY(0);
        }

        /* 页脚 */
        .footer {
            margin-top: 60px;
            text-align: center;
            color: rgba(255,255,255,0.2);
            font-size: 13px;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .footer a {
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: rgba(255,255,255,0.6);
        }

        /* 加载过渡 */
        .page-load {
            animation: pageIn 0.6s ease-out;
        }

        @keyframes pageIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.3);
        }

        .empty-state .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        /* 响应式 */
        @media (max-width: 700px) {
            body {
                padding: 24px 16px 40px;
            }

            .header h1 {
                font-size: 30px;
            }

            .header-icon {
                font-size: 36px;
            }

            .game-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .card-banner {
                height: 150px;
            }

            .card-banner .banner-emoji {
                font-size: 48px;
            }

            .card-body {
                padding: 18px 20px 20px;
            }

            .play-btn {
                padding: 8px 22px;
                font-size: 13px;
            }
        }

        @media (max-width: 400px) {
            .card-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .play-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container page-load">
        <!-- 页头 -->
        <header class="header">
            <span class="header-icon">🎮</span>
            <h1>游戏列表</h1>
            <p>选择一个游戏开始冒险吧</p>
        </header>

        <!-- 游戏网格 -->
        <div class="game-grid" id="gameGrid">
            <!-- 游戏卡片由 JS 动态生成 -->
        </div>

        <!-- 页脚 -->
        <footer class="footer">
            <p>Powered by <a href="https://pages.cloudflare.com" target="_blank" rel="noopener">Cloudflare Pages</a></p>
        </footer>
    </div>

    <script>
        // ---------- 游戏数据 ----------
        const games = [
            {
                id: 'naiaowang',
                title: '耐熬王模拟器',
                subtitle: '荒岛度假',
                emoji: '🏝️',
                desc: '你在荒岛上参加一场极限生存挑战，管理营养值、搭建庇护所、打猎钓鱼、探索地形……坚持到第100天即可赢得100万奖金！',
                tags: ['生存', '策略', '回合'],
                players: '单人',
                file: '耐熬王模拟器-荒岛度假.html',
                bannerGradient: 'linear-gradient(135deg, #0f2027, #203a43, #2c5364)',
            }
        ];

        // ---------- 生成星星 ----------
        function createStars() {
            const container = document.getElementById('stars');
            const count = Math.min(80, Math.floor(window.innerWidth / 12));
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (3 + Math.random() * 5) + 's');
                star.style.animationDelay = (Math.random() * 5) + 's';
                star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
                container.appendChild(star);
            }
        }

        // ---------- 生成卡片 ----------
        function renderGames() {
            const grid = document.getElementById('gameGrid');

            if (games.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="empty-icon">📭</div>
                        <p>暂时还没有游戏，敬请期待！</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = games.map(game => `
                <div class="game-card" data-url="${game.file}">
                    <div class="card-banner" style="background: ${game.bannerGradient || 'linear-gradient(135deg, #1a1a3e, #2d1b69)'};">
                        <div class="banner-bg"></div>
                        <span class="banner-emoji">${game.emoji}</span>
                    </div>
                    <div class="card-body">
                        <div class="card-title">
                            ${game.title}
                            ${game.subtitle ? `<span style="color:rgba(255,255,255,0.5);font-weight:400;font-size:16px;">- ${game.subtitle}</span>` : ''}
                            ${game.tags && game.tags.length ? game.tags.map(t => `<span class="tag">${t}</span>`).join('') : ''}
                        </div>
                        <div class="card-desc">${game.desc}</div>
                        <div class="card-meta">
                            <div class="info">
                                ${game.players ? `<span>👤 ${game.players}</span>` : ''}
                                ${game.file ? `<span>📄 ${game.file}</span>` : ''}
                            </div>
                            <button class="play-btn" onclick="playGame('${game.file}')">开始游戏</button>
                        </div>
                    </div>
                </div>
            `).join('');

            // 点击卡片除按钮外的区域也会跳转
            document.querySelectorAll('.game-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    if (e.target.classList.contains('play-btn')) return;
                    const url = this.dataset.url;
                    if (url) window.location.href = url;
                });
            });
        }

        // ---------- 跳转游戏 ----------
        function playGame(file) {
            if (file) {
                window.location.href = file;
            }
        }

        // ---------- 初始化 ----------
        document.addEventListener('DOMContentLoaded', () => {
            createStars();
            renderGames();
        });
    </script>
</body>
</html>
